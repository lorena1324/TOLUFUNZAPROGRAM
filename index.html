<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Operación Funza</title>

<style>

*{
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#0b2545,#1f4f7a,#2c7bb6);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:1100px;
background:white;
border-radius:16px;
padding:40px;
box-shadow:0 25px 70px rgba(0,0,0,0.35);
}

.header{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
margin-bottom:30px;
border-bottom:1px solid #eee;
padding-bottom:20px;
}

.logo{
height:120px;
object-fit:contain;
margin-bottom:10px;
}

.title{
font-size:26px;
font-weight:700;
color:#0b2545;
}

.subtitle{
font-size:14px;
color:#666;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:18px;
}

.field{
display:flex;
flex-direction:column;
}

label{
font-size:13px;
font-weight:600;
margin-bottom:6px;
}

input,select{
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

.personas-box{
margin-top:20px;
}

.timer-box{
margin-top:30px;
background:#f3f7fb;
padding:20px;
border-radius:12px;
text-align:center;
}

.timer{
font-size:36px;
font-weight:bold;
color:#0b2545;
}

.buttons{
margin-top:25px;
display:flex;
gap:15px;
}

button{
flex:1;
padding:16px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.start{background:#27ae60;color:white;}
.stop{background:#e74c3c;color:white;}

.notificacion{
position:fixed;
top:20px;
right:20px;
padding:16px 26px;
border-radius:10px;
color:white;
font-weight:600;
transform:translateX(400px);
transition:0.4s;
}

.notificacion.show{transform:translateX(0);}
.success{background:#27ae60;}
.error{background:#e74c3c;}

</style>

</head>

<body>

<div class="container">

<div class="header">

<img src="/inlotrans.png" class="logo">

<div class="title">Sistema Operación Funza</div>
<div class="subtitle">Registro Logístico</div>

</div>

<div class="grid">

<div class="field">
<label>Motivo</label>
<select id="motivo">
<option>Seleccione</option>
<option>Cargue</option>
<option>Descargue</option>
</select>
</div>

<div class="field">
<label>Placa</label>
<input id="placa">
</div>

<div class="field">
<label>Tipo Vehículo</label>
<select id="vehiculo">
<option>Seleccione</option>
<option>Camión</option>
<option>Tractomula</option>
</select>
</div>

<div class="field">
<label>Destino</label>
<select id="destino">
<option>Funza</option>
<option>Cali</option>
<option>Medellin</option>
</select>
</div>

<div class="field">
<label>Muelle</label>
<select id="muelle">
<option>10</option>
<option>11</option>
<option>12</option>
</select>
</div>

<div class="field">
<label>Líder</label>
<select id="lider">
<option>Anderson Molina</option>
<option>Wilmer Abril</option>
</select>
</div>

<div class="field">
<label>Cantidad de Estibas</label>
<input type="number" id="estibas">
</div>

<div class="field">
<label>Cajas Movidas</label>
<input type="number" id="cajas">
</div>

<div class="field">
<label>Número de Personas</label>
<select id="personas" onchange="crearCamposPersonas()">
<option value="">Seleccione</option>
<script>
for(let i=1;i<=20;i++){
document.write(`<option value="${i}">${i}</option>`)
}
</script>
</select>
</div>

</div>

<div class="personas-box" id="listaPersonas"></div>

<div class="timer-box">

<div class="timer" id="timer">00:00:00</div>

</div>

<div class="buttons">

<button class="start" onclick="iniciar()">INICIAR</button>
<button class="stop" onclick="finalizar()">FINALIZAR</button>

</div>

</div>

<div id="notificacion" class="notificacion"></div>

<script>

let inicio=null
let intervalo=null
let operacionIniciada=false

function crearCamposPersonas(){

let cantidad=document.getElementById("personas").value
let contenedor=document.getElementById("listaPersonas")

contenedor.innerHTML=""

for(let i=1;i<=cantidad;i++){

let campo=document.createElement("div")
campo.className="field"

campo.innerHTML=`
<label>Nombre Persona ${i}</label>
<input type="text" class="personaNombre">
`

contenedor.appendChild(campo)

}

}

function iniciar(){

inicio=new Date()
operacionIniciada=true

intervalo=setInterval(()=>{

let ahora=new Date()
let diff=ahora-inicio

let h=Math.floor(diff/3600000)
let m=Math.floor((diff%3600000)/60000)
let s=Math.floor((diff%60000)/1000)

document.getElementById("timer").innerText=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0")

},1000)

mostrarNotificacion("Operación iniciada","success")

}

function finalizar(){

if(!operacionIniciada){
mostrarNotificacion("Debes iniciar primero","error")
return
}

clearInterval(intervalo)

let nombres=[]
document.querySelectorAll(".personaNombre").forEach(input=>{
nombres.push(input.value)
})

let data={

personas:nombres,
estibas:document.getElementById("estibas").value,
cajas:document.getElementById("cajas").value,
inicio:inicio,
fin:new Date()

}

console.log(data)

mostrarNotificacion("Registro guardado","success")

}

function mostrarNotificacion(mensaje,tipo){

let box=document.getElementById("notificacion")

box.innerText=mensaje
box.className="notificacion show "+tipo

setTimeout(()=>{
box.classList.remove("show")
},3000)

}

</script>

</body>
</html>
