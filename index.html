<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Operación Funza</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0b2545, #1f4f7a, #2c7bb6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: white;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        /* HEADER */

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }

        .logo {
            height: 110px;
            margin-bottom: 10px;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            color: #0b2545;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
        }

        /* GRID */

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        input,
        select {
            padding: 11px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        /* PERSONAS */

        .personas-box {
            margin-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        /* TIMER */

        .timer-box {
            margin-top: 25px;
            background: #f3f7fb;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .timer {
            font-size: 38px;
            font-weight: bold;
            color: #0b2545;
        }

        /* BOTONES */

        .buttons {
            margin-top: 25px;
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .start {
            background: #27ae60;
            color: white;
        }

        .stop {
            background: #e74c3c;
            color: white;
        }

        /* ALERTAS */

        .notificacion {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 26px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            transform: translateX(400px);
            transition: 0.4s;
        }

        .notificacion.show {
            transform: translateX(0);
        }

        .success {
            background: #27ae60;
        }

        .error {
            background: #e74c3c;
        }

        /* TABLET */

        @media(max-width:900px) {

            .grid {
                grid-template-columns: 1fr 1fr;
            }

            .personas-box {
                grid-template-columns: 1fr 1fr;
            }

        }

        /* CELULAR */

        @media(max-width:600px) {

            body {
                align-items: flex-start;
            }

            .container {
                padding: 25px;
            }

            .logo {
                height: 85px;
            }

            .title {
                font-size: 20px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .personas-box {
                grid-template-columns: 1fr;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .timer {
                font-size: 32px;
            }

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="header">

            <img src="/inlotrans.png" class="logo">

            <div class="title">Sistema Operación Funza</div>
            <div class="subtitle">Registro Logístico de Cargue / Descargue</div>

        </div>

        <div class="grid">

            <div class="field">
                <label>Motivo</label>
                <select id="motivo">
                    <option value="">Seleccione</option>
                    <option>Cargue</option>
                    <option>Descargue</option>
                </select>
            </div>

            <div class="field">
                <label>Placa</label>
                <input id="placa" placeholder="ABC123">
            </div>

            <div class="field">
                <label>Tipo Vehículo</label>
                <select id="vehiculo">
                    <option value="">Seleccione</option>
                    <option>Van extralargo</option>
                    <option>Camión sencillo</option>
                    <option>Tractomula</option>
                </select>
            </div>

            <div class="field">
                <label>Destino</label>
                <select id="destino">
                    <option value="">Seleccione</option>
                    <option>Cali</option>
                    <option>Medellin</option>
                    <option>Barranquilla</option>
                    <option>Funza</option>
                </select>
            </div>

            <div class="field">
                <label>Muelle</label>
                <select id="muelle">
                    <option value="">Seleccione</option>
                    <option>10</option>
                    <option>11</option>
                    <option>12</option>
                    <option>13</option>
                    <option>14</option>
                    <option>15</option>
                </select>
            </div>

            <div class="field">
                <label>Líder Operación</label>
                <select id="lider">
                    <option value="">Seleccione</option>
                    <option>Anderson Molina</option>
                    <option>Wilmer Abril</option>
                    <option>Joan León</option>
                </select>
            </div>

            <div class="field">
                <label>Cantidad de Estibas</label>
                <input type="number" id="estibas">
            </div>

            <div class="field">
                <label>Cajas Movidas</label>
                <input type="number" id="cajas">
            </div>

            <div class="field">
                <label>Número de Personas</label>
                <select id="personas" onchange="crearCamposPersonas()">
                    <option value="">Seleccione</option>

                    <script>
                        for (let i = 1; i <= 20; i++) {
                            document.write(`<option value="${i}">${i}</option>`)
                        }
                    </script>

                </select>
            </div>

        </div>

        <div id="listaPersonas" class="personas-box"></div>

        <div class="timer-box">

            <div class="timer" id="timer">00:00:00</div>

        </div>

        <div class="buttons">

            <button class="start" onclick="iniciar()">INICIAR OPERACIÓN</button>
            <button class="stop" onclick="finalizar()">FINALIZAR OPERACIÓN</button>

        </div>

    </div>

    <div id="notificacion" class="notificacion"></div>

    <script>

        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7RSNJ0xh_mlxrquaaIaYi3pmd7pMQFtSyE9z0Wwi4VqyMKYjg9meFRLIKb57oaH55/exec"

        let inicio = null
        let intervalo = null
        let operacionIniciada = false

        function formatearTiempo(diffMs) {

            let h = Math.floor(diffMs / 3600000)
            let m = Math.floor((diffMs % 3600000) / 60000)
            let s = Math.floor((diffMs % 60000) / 1000)

            return String(h).padStart(2, "0") + ":" +
                String(m).padStart(2, "0") + ":" +
                String(s).padStart(2, "0")

        }

        function crearCamposPersonas() {

            let cantidad = document.getElementById("personas").value
            let contenedor = document.getElementById("listaPersonas")

            contenedor.innerHTML = ""

            for (let i = 1; i <= cantidad; i++) {

                let campo = document.createElement("div")
                campo.className = "field"

                campo.innerHTML = `
<label>Persona ${i}</label>
<input type="text" class="personaNombre" placeholder="Nombre">
`

                contenedor.appendChild(campo)

            }

        }

        function iniciar() {

            if (operacionIniciada) {
                mostrarNotificacion("La operación ya fue iniciada", "error")
                return
            }

            inicio = new Date()
            operacionIniciada = true

            intervalo = setInterval(() => {

                let ahora = new Date()
                let diff = ahora - inicio

                document.getElementById("timer").innerText = formatearTiempo(diff)

            }, 1000)

            mostrarNotificacion("Operación iniciada", "success")

        }

        async function finalizar() {

            if (!operacionIniciada) {
                mostrarNotificacion("Debes iniciar la operación primero", "error")
                return
            }

            clearInterval(intervalo)

            let fin = new Date()
            let tiempoTranscurrido = formatearTiempo(fin - inicio)
            document.getElementById("timer").innerText = tiempoTranscurrido

            let nombres = []

            document.querySelectorAll(".personaNombre").forEach(input => {
                nombres.push(input.value.trim())
            })

            nombres = nombres.filter(nombre => nombre !== "")

            let payload = {
                columna1: document.getElementById("motivo").value,
                columna2: document.getElementById("placa").value,
                columna3: document.getElementById("vehiculo").value,
                columna4: document.getElementById("destino").value,
                columna5: document.getElementById("muelle").value,
                columna6: document.getElementById("lider").value,
                columna7: document.getElementById("estibas").value,
                columna8: document.getElementById("cajas").value,
                columna9: document.getElementById("personas").value,
                columna10: nombres.join(", "),
                columna11: tiempoTranscurrido
            }

            if (!APPS_SCRIPT_URL) {
                console.log("Configura APPS_SCRIPT_URL para enviar datos", payload)
                mostrarNotificacion("Falta configurar la URL de Apps Script", "error")
                operacionIniciada = false
                return
            }

            try {

                let respuesta = await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8"
                    },
                    body: JSON.stringify(payload)
                })

                console.log("Resultado envío Apps Script", {
                    ok: respuesta.ok,
                    status: respuesta.status,
                    statusText: respuesta.statusText,
                    tipoRespuesta: respuesta.type,
                    payloadEnviado: payload
                })

                mostrarNotificacion("Registro guardado correctamente", "success")

            } catch (error) {

                console.error("Error enviando a Apps Script", error)
                mostrarNotificacion("Error enviando el registro", "error")

            }

            operacionIniciada = false
            document.getElementById("timer").innerText = "00:00:00"

        }

        function mostrarNotificacion(mensaje, tipo) {

            let box = document.getElementById("notificacion")

            box.innerText = mensaje
            box.className = "notificacion show " + tipo

            setTimeout(() => {
                box.classList.remove("show")
            }, 3000)

        }

    </script>

</body>

</html>
